name: Build Orange 6 APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip python3-dev python3-venv \
            git zip unzip openjdk-17-jdk build-essential ccache \
            libncurses5-dev libssl-dev libffi-dev autoconf automake \
            libtool pkg-config curl wget

      - name: Install Python deps
        run: |
          pip install --quiet --upgrade pip
          pip install --quiet buildozer cython

      - name: Cache SDK/NDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-v1

      - name: Build APK
        run: |
          buildozer android debug 2>&1 || buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: orange6-arm64-v8a-apk
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30