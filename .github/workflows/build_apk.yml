name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip python3-dev git zip unzip openjdk-17-jdk build-essential ccache libssl-dev curl wget
          pip install --quiet --upgrade pip setuptools wheel buildozer cython
      - name: Build APK
        run: yes | buildozer android debug 2>&1
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: orange6-apk
          path: bin/*.apk
          retention-days: 30
